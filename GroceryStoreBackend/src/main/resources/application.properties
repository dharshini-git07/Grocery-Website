# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/grocery_store_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.grocerystore=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForGroceryStoreApplicationThatMustBeAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WhatsApp Configuration
whatsapp.api.url=https://api.whatsapp.com/send
whatsapp.phone.number=9994411370
whatsapp.api.token=${WHATSAPP_API_TOKEN:}

# Application Configuration
app.name=Shri Dev BalaKrishna Store
app.version=1.0.0

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=on_param
